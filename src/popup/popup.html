<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link href="https://fonts.googleapis.com/css2?family=Laila:wght@400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="root">
    <h1><span style="font-weight:700">Method</span><span style="font-family:'Laila',serif;font-weight:400">Proof</span></h1>
    <div id="status" class="status disconnected">Disconnected</div>
    <div id="session-id" class="session-id"></div>
    <div id="capture-info" class="capture-info" style="display:none">
      Capturing: page visits, tab switches, copy events (metadata only), search activity, AI tool usage.
      Sensitive sites (banking, email, health) are redacted.
    </div>
    <div id="pending" class="pending" style="display:none"></div>
    <button id="sync-now" class="btn btn-sync" style="display:none">Sync Now</button>
    <button id="end-session" class="btn" style="display:none">End Session</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
