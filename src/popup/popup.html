<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link href="https://fonts.googleapis.com/css2?family=Laila:wght@400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="root">
    <!-- Circuit header (shared both states) -->
    <img class="circuit-art" src="../icons/circuit-header.svg" alt="" />

    <!-- Wordmark -->
    <div class="wordmark">
      <h1><span style="font-weight:700">Method</span><span style="font-family:'Laila',serif;font-weight:400">Proof</span></h1>
    </div>

    <!-- Ink divider -->
    <div class="divider"></div>

    <!-- Content -->
    <div class="content">
      <div id="status" class="status disconnected">
        <span class="status-dot"></span>
        Disconnected
      </div>
      <div id="session-id" class="session-id"></div>
      <div id="capture-info" class="capture-info" style="display:none">
        Capturing: page visits, tab switches, copy events (metadata only), search activity, AI tool usage.
        Sensitive sites (banking, email, health) are redacted.
      </div>
      <div id="pending" class="pending" style="display:none"></div>
      <button id="sync-now" class="btn btn-sync" style="display:none">Connect</button>
      <button id="end-session" class="btn btn-end" style="display:none">End Session</button>
    </div>

    <!-- Footer circuits (swap based on state) -->
    <img id="footer-disconnected" class="circuit-art" src="../icons/footer-disconnected.svg" alt="" />
    <img id="footer-connected" class="circuit-art" src="../icons/footer-connected.svg" alt="" style="display:none" />
  </div>
  <script src="popup.js"></script>
</body>
</html>
